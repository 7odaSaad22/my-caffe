<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png">
    <title>تسجيل الدخول | Averroes Coffee</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Updated background gradient: Blue to Dark Red */
            background: linear-gradient(135deg, #153E90, #8E1600);
            background-size: cover;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .form-group label {
            margin-bottom: 5px;
            display: block;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .error-msg {
            color: var(--danger);
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>

<body>

    <button onclick="toggleDarkMode()" class="dark-mode-btn" style="position:fixed; top:15px; left:15px; background:rgba(255,255,255,0.2); border:none; font-size:1.3rem; cursor:pointer; border-radius:50%; width:45px; height:45px; z-index:9999; backdrop-filter:blur(5px);">🌙</button>

    <div class="login-card" id="main-login-card">
        <img src="logo.png" alt="Averroes Coffee Logo" style="width: 120px; margin-bottom: 20px;">
        <h1 style="color: var(--primary-color); margin-bottom: 10px;">Averroes Coffee</h1>
        <h3 style="margin-bottom: 20px; color: #666;">تسجيل الدخول</h3>
        <div id="error-msg" class="error-msg">كلمة المرور غير صحيحة!</div>

        <div class="form-group">
            <label for="username">اسم المستخدم</label>
            <input type="text" id="username" placeholder="أدخل اسم المستخدم">
        </div>

        <div class="form-group">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور">
        </div>

        <button onclick="handleLogin()" class="btn"
            style="width: 100%; font-size: 1.1rem; margin-top: 10px;">دخول</button>

        <div style="margin-top: 15px;">
            <a href="javascript:void(0)" onclick="toggleForgotView(true)"
                style="color: var(--primary-color); text-decoration: none; font-size: 0.95rem; font-weight: bold;">هل
                نسيت كلمة السر؟</a>
        </div>
    </div>

    <!-- بطاقة التأكد من المستخدم -->
    <div class="login-card" id="forgot-card" style="display: none;">
        <img src="logo.png" alt="Averroes Coffee Logo" style="width: 90px; margin-bottom: 15px;">
        <h3 style="color: var(--primary-color); margin-bottom: 15px;">استعادة كلمة السر</h3>
        <p style="font-size: 0.9rem; margin-bottom: 15px; color: #555;">أدخل اسم المستخدم (أو الإيميل) الخاص بك للبحث
            عنه ضمن قائمة العملاء</p>
        <div id="forgot-error" class="error-msg"></div>
        <div class="form-group">
            <input type="text" id="forgot-username" placeholder="اسم المستخدم أو الإيميل">
        </div>
        <button onclick="handleVerifyUser()" class="btn" style="width: 100%; margin-bottom: 10px;">تحقق من
            الحساب</button>
        <button onclick="toggleForgotView(false)" class="btn btn-danger"
            style="width: 100%; background-color: #888;">العودة لتسجيل الدخول</button>
    </div>

    <!-- بطاقة كتابة كلمة السر الجديدة -->
    <div class="login-card" id="reset-card" style="display: none;">
        <img src="logo.png" alt="Averroes Coffee Logo" style="width: 90px; margin-bottom: 15px;">
        <h3 style="color: var(--primary-color); margin-bottom: 10px;">إعادة تعيين كلمة السر</h3>
        <p id="reset-user-name-display"
            style="font-size: 0.95rem; margin-bottom: 15px; color: #28a745; font-weight: bold;"></p>
        <div id="reset-error" class="error-msg"></div>
        <div class="form-group">
            <label for="forgot-new-password">أدخل كلمة السر الجديدة:</label>
            <input type="text" id="forgot-new-password" placeholder="كلمة السر الجديدة">
        </div>
        <button onclick="handleSaveNewPassword()" class="btn btn-success" style="width: 100%; margin-bottom: 10px;">حفظ
            والتسجيل</button>
        <button onclick="toggleForgotView(false)" class="btn btn-danger" style="width: 100%;">إلغاء</button>
    </div>

    <!-- تذييل الصفحة -->
    <footer
        style="position: fixed; bottom: 0; left: 0; right: 0; width: 100%; z-index: 9999; text-align: center; padding: 12px; background: rgba(0,0,0,0.85); color: #fff; font-size: 0.95rem; backdrop-filter: blur(5px);">
        <p style="margin: 3px 0;">جميع الحقوق محفوظة لـ <strong>Averroes Coffee</strong> &copy;</p>
        <p style="margin: 3px 0; font-weight: bold; font-size: 1.1rem; color: #f1c40f;">تمت البرمجة بواسطة محمود هتلر
        </p>
        <div
            style="margin-top: 5px; display: flex; justify-content: center; gap: 20px; align-items: center; direction: ltr;">
            <a href="https://wa.me/201158221296" target="_blank"
                style="color: #25D366; text-decoration: none; display: flex; align-items: center; gap: 6px; font-weight: bold;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51h-.57c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
                </svg>
                WhatsApp
            </a>
            <span style="color: rgba(255,255,255,0.3); font-size: 1.2rem;">|</span>
            <a href="mailto:mahmoud.saaad137@gmail.com"
                style="color: #fff; text-decoration: none; display: flex; align-items: center; gap: 6px; font-size: 0.95rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                    <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
                </svg>
                mahmoud.saaad137@gmail.com
            </a>
        </div>
    </footer>

    <script type="module" src="supabase_client.js"></script>
    <script src="script.js"></script>
    <script>
        // Inline script removed to use window.handleLogin from script.js
    </script>
</body>

</html>
