<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png">
    <title>404 | Averroes Coffee</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #153E90, #8E1600);
            margin: 0;
        }

        .error-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        .error-code {
            font-size: 5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0;
            line-height: 1;
        }

        .error-icon {
            font-size: 4rem;
            margin: 15px 0;
        }

        .error-message {
            font-size: 1.2rem;
            color: var(--text-color);
            margin: 15px 0 25px;
        }

        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        .btn-home:hover {
            background: var(--secondary-color);
        }
    </style>
</head>

<body>
    <div class="error-card">
        <p class="error-code">404</p>
        <div class="error-icon">☕</div>
        <p class="error-message">عذراً، الصفحة اللي بتدور عليها مش موجودة!</p>
        <a href="index.html" class="btn-home">العودة لتسجيل الدخول</a>
    </div>

    <script src="script.js"></script>
</body>

</html>
